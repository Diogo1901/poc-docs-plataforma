name: DevScope SmartKnowledge Sync & Deploy

on:
  push:
    branches: [ main ]
    # Só dispara se mexerem nos docs ou na configuração
    paths:
      - 'docs/**'
      - 'devscope.json'
      - 'devscope-sync.js'

# Permissões estritas para publicar no GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout do código
        uses: actions/checkout@v4

      - name: 2. Configurar Node.js (v18)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 3. Sincronizar com a API DevScope
        # Este script lê os .md, envia para a tua API C# e guarda o "site-compilado.zip"
        run: node devscope-sync.js
        env:
          DEVSCOPE_API_URL: ${{ secrets.DEVSCOPE_API_URL }}
          DEVSCOPE_PIPELINE_KEY: ${{ secrets.DEVSCOPE_PIPELINE_KEY }}
          # Nota: Se o TENANT_ID já estiver no devscope.json, podes tirar esta linha
          DEVSCOPE_TENANT_ID: ${{ secrets.DEVSCOPE_TENANT_ID }}

      - name: 4. Extrair o Site Compilado (ZIP)
        # Descompacta o ZIP que a tua API devolveu para uma pasta chamada "dist"
        run: |
          mkdir dist
          unzip site-compilado.zip -d dist/

      - name: 5. Preparar Upload para o GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build-and-sync
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 6. Publicar Site Estático
        id: deployment
        uses: actions/deploy-pages@v4
